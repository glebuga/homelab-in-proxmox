---
- name: Infrastructure OS Discovery
  hosts: vm_nodes
  gather_facts: true
  become: false

  tasks:
    - name: Display Operating System and version details
      ansible.builtin.debug:
        msg: |-
          Host [ {{ inventory_hostname }} ] is running:
          {{ ansible_distribution }} {{ ansible_distribution_version }}
          (Family: {{ ansible_os_family }}, Kernel: {{ ansible_kernel }})