---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Deploy reverse proxy configuration
  ansible.builtin.template:
    src: homelab.conf.j2
    dest: /etc/nginx/sites-available/homelab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/homelab.conf
    dest: /etc/nginx/sites-enabled/homelab.conf
    state: link
  notify: restart nginx

- name: Check nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Apply changes
  ansible.builtin.meta: flush_handlers