---
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present

- name: Generate hosts file
  ansible.builtin.template:
    src: homelab.hosts.j2
    dest: /etc/homelab.hosts
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

- name: Configure dnsmasq
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.d/homelab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

- name: Enable dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

- name: Apply changes
  ansible.builtin.meta: flush_handlers