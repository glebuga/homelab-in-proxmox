[defaults]
inventory            = ./inventory/terraform_inventory.py  # dynamic inventory from terraform outputs
host_key_checking    = True  # verify host keys to prevent MITM
stdout_callback      = yaml
bin_ansible_callbacks = True
retry_files_enabled  = False
roles_path           = ./roles
collections_path     = ./collections
interpreter_python   = auto_silent

[privilege_escalation]
become               = True
become_method        = sudo
become_ask_pass      = False

[ssh_connection]
pipelining           = True
control_path_dir     = ~/.ansible/cp  # keep control sockets out of world-writable /tmp
accept_new_host_key  = True  # auto-add host key on first connect (accept-new), still rejects changed keys
