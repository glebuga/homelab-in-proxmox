---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: "{{ common_upgrade_mode }}"
  when: common_upgrade | bool

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Configure NTP (systemd-timesyncd)
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart systemd-timesyncd
  when: ansible_service_mgr == 'systemd'

- name: Enable and start systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'

- name: Configure base shell for admin user
  ansible.builtin.template:
    src: bashrc.j2
    dest: "/home/{{ admin_user }}/.bashrc"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"
  when: common_shell_config | bool

- name: Detect root device (LXC only)
  ansible.builtin.command:
    cmd: "findmnt -n -o SOURCE /"
  register: root_device
  changed_when: false
  when: ansible_virtualization_type == 'lxc'

- name: Grow root filesystem to fill the disk (LXC only)
  ansible.builtin.command:
    cmd: "resize2fs {{ root_device.stdout | trim }}"
  when:
    - ansible_virtualization_type == 'lxc'
    - root_device.stdout | trim | length > 0
  changed_when: false
  failed_when: false
