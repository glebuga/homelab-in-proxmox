---
# Роль — ЕДИНСТВЕННЫЙ владелец установки Docker + compose-plugin.
# Остальные роли (напр. harbor) должны зависеть от неё, а не ставить Docker сами.

# Пакеты Docker CE для установки (engine, CLI, containerd, compose plugin).
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin

# Пользователи в группе 'docker' (могут запускать docker без sudo).
docker_users:
  - "{{ admin_user }}"

# Включить и запустить сервис docker при загрузке.
docker_enable_service: true
