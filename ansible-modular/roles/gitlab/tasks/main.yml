---
# Предварительные проверки: что уже установлено (пропуск тяжёлых шагов на живом инстансе).
- name: Check if GitLab is already installed
  ansible.builtin.stat:
    path: /usr/bin/gitlab-ctl
  register: gitlab_installed

- name: Check if GitLab apt repository is already configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/gitlab_{{ gitlab_edition }}.list
  register: gitlab_repo_present

- name: Check if GitLab HTTPS port is already listening
  ansible.builtin.wait_for:
    port: "{{ gitlab_https_port }}"
    timeout: 5
  register: gitlab_port_listening
  ignore_errors: true

# TLS: копируем локальный self-signed сертификат (имя <fqdn>.crt — его и ждёт Omnibus).
- name: Ensure GitLab SSL directory exists
  ansible.builtin.file:
    path: "{{ gitlab_ssl_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy GitLab TLS certificate
  ansible.builtin.copy:
    src: "{{ gitlab_local_cert_src }}/{{ gitlab_cert_file }}"
    dest: "{{ gitlab_ssl_dir }}/{{ gitlab_ssl_cert_dest }}"
    owner: root
    group: root
    mode: "0644"
  notify: reconfigure gitlab

- name: Copy GitLab TLS private key
  ansible.builtin.copy:
    src: "{{ gitlab_local_cert_src }}/{{ gitlab_key_file }}"
    dest: "{{ gitlab_ssl_dir }}/{{ gitlab_ssl_key_dest }}"
    owner: root
    group: root
    mode: "0600"
  notify: reconfigure gitlab

# Подключение репозитория GitLab (только если ещё нет).
- name: Install prerequisites for GitLab repo
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - openssh-server
    state: present
    update_cache: true
  when: not gitlab_repo_present.stat.exists

- name: Create GitLab keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not gitlab_repo_present.stat.exists

- name: Download GitLab GPG key
  ansible.builtin.get_url:
    url: "https://packages.gitlab.com/gpg.key"
    dest: /tmp/gitlab-gpg.key
    mode: "0644"
  when: not gitlab_repo_present.stat.exists

- name: Dearmor GitLab GPG key into keyring
  ansible.builtin.command:
    cmd: "gpg --dearmor -o /etc/apt/keyrings/gitlab.gpg /tmp/gitlab-gpg.key"
    creates: /etc/apt/keyrings/gitlab.gpg
  when: not gitlab_repo_present.stat.exists

- name: Add GitLab apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/gitlab_{{ gitlab_edition }}.list
    owner: root
    group: root
    mode: "0644"
    content: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/gitlab.gpg]
      https://packages.gitlab.com/gitlab/{{ gitlab_edition }}/ubuntu/ {{ gitlab_repo_codename }} main
  when: not gitlab_repo_present.stat.exists

- name: Update apt cache for GitLab repository
  ansible.builtin.apt:
    update_cache: true
  when: not gitlab_repo_present.stat.exists

# gitlab.rb рендерим ДО установки пакета — postinst сам дёрнет reconfigure.
- name: Render gitlab.rb configuration
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: "0600"
  no_log: true

# Установка пакета (только если ещё не установлен).
- name: Install GitLab omnibus package
  ansible.builtin.apt:
    name: "{{ gitlab_edition }}{% if gitlab_version | length > 0 %}={{ gitlab_version }}{% endif %}"
    state: present
  environment:
    EXTERNAL_URL: "{{ gitlab_external_url }}"
  register: gitlab_pkg_install
  failed_when:
    - gitlab_pkg_install.rc != 0
    - "'already the newest version' not in gitlab_pkg_install.stdout"
  when: not gitlab_installed.stat.exists

# Применение конфигурации и ожидание HTTPS.
- name: Run gitlab-ctl reconfigure (initial)
  ansible.builtin.command:
    cmd: gitlab-ctl reconfigure
    creates: /var/opt/gitlab/bootstrapped

- name: Enable and start GitLab service
  ansible.builtin.systemd:
    name: "{{ gitlab_service }}"
    enabled: true
    state: started

- name: Set GitLab root password from vault (idempotent)
  ansible.builtin.command:
    cmd: >-
      gitlab-rails runner "user = User.find_by(username: 'root');
      user.password = '{{ gitlab_root_password }}';
      user.password_confirmation = '{{ gitlab_root_password }}';
      user.save!(validate: false)"
  no_log: true
  changed_when: false

- name: Wait for GitLab HTTPS port
  ansible.builtin.wait_for:
    port: "{{ gitlab_https_port }}"
    timeout: 600
  when: not gitlab_port_listening is succeeded
