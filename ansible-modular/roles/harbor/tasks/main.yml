---
# ---------------------------------------------------------------------------
# Harbor deployment.
#
# Docker + compose-plugin are provided by the 'docker' role, declared as a
# dependency in meta/main.yml. This role therefore does NOT install Docker.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# 1. Copy pre-generated TLS certificate (external, not generated by role)
# ---------------------------------------------------------------------------
- name: Ensure cert directory exists on host
  ansible.builtin.file:
    path: "{{ harbor_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Harbor TLS certificate from external source
  ansible.builtin.copy:
    src: "{{ harbor_local_cert_src }}/{{ harbor_cert_file }}"
    dest: "{{ harbor_cert_dir }}/{{ harbor_cert_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart harbor

- name: Copy Harbor TLS private key from external source
  ansible.builtin.copy:
    src: "{{ harbor_local_cert_src }}/{{ harbor_key_file }}"
    dest: "{{ harbor_cert_dir }}/{{ harbor_key_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: restart harbor

# ---------------------------------------------------------------------------
# 2. Download and unpack Harbor release
# ---------------------------------------------------------------------------
- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ harbor_install_dir }}"
    state: directory
    mode: "0755"

- name: Download Harbor installer (online)
  when:
    - not harbor_skip_download
    - not harbor_offline_installer
  ansible.builtin.get_url:
    url: "https://github.com/goharbor/harbor/releases/download/{{ harbor_version }}/harbor-online-installer-{{ harbor_version }}.tgz"
    dest: "/tmp/harbor-installer.tgz"
    mode: "0644"
  register: harbor_download

- name: Use local offline installer archive
  when:
    - not harbor_skip_download
    - harbor_offline_installer
    - harbor_local_installer_src | length > 0
  ansible.builtin.copy:
    src: "{{ harbor_local_installer_src }}"
    dest: "/tmp/harbor-installer.tgz"
    mode: "0644"
  register: harbor_download

- name: Unpack Harbor installer
  when: not harbor_skip_download
  ansible.builtin.unarchive:
    src: "/tmp/harbor-installer.tgz"
    dest: "{{ harbor_install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
    creates: "{{ harbor_install_dir }}/harbor.yml.tmpl"

# ---------------------------------------------------------------------------
# 3. Render harbor.yml from template (HTTPS + vault password)
# ---------------------------------------------------------------------------
- name: Render harbor.yml configuration
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: "{{ harbor_install_dir }}/harbor.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart harbor

# ---------------------------------------------------------------------------
# 4. Run the official installer (prepare + docker compose up)
# ---------------------------------------------------------------------------
- name: Run Harbor installer
  ansible.builtin.command:
    cmd: "{{ harbor_install_dir }}/install.sh"
    chdir: "{{ harbor_install_dir }}"
    creates: "{{ harbor_install_dir }}/docker-compose.yml"

# ---------------------------------------------------------------------------
# 4b. Ensure Harbor containers are actually running.
# ---------------------------------------------------------------------------
- name: Ensure Harbor stack is running
  ansible.builtin.command:
    cmd: "docker compose -f {{ harbor_install_dir }}/docker-compose.yml up -d"
    chdir: "{{ harbor_install_dir }}"

- name: Install Harbor auto-start systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/harbor.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Harbor container registry
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory={{ harbor_install_dir }}
      ExecStart=/usr/bin/docker compose -f {{ harbor_install_dir }}/docker-compose.yml up -d
      ExecStop=/usr/bin/docker compose -f {{ harbor_install_dir }}/docker-compose.yml down
      TimeoutStartSec=300

      [Install]
      WantedBy=multi-user.target
  notify: restart harbor

- name: Enable Harbor auto-start service
  ansible.builtin.systemd:
    name: harbor
    enabled: true
    daemon_reload: true

# ---------------------------------------------------------------------------
# 5. Wait for HTTPS to come up
# ---------------------------------------------------------------------------
- name: Wait for Harbor HTTPS port
  ansible.builtin.wait_for:
    port: "{{ harbor_https_port }}"
    timeout: 300

# ---------------------------------------------------------------------------
# 6. Replace the default 'library' project with the configured project.
# ---------------------------------------------------------------------------
- name: Check if default library project exists
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects/library"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code:
      - 200
      - 404
  register: library_check
  no_log: true

- name: Delete default library project
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects/library"
    method: DELETE
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code:
      - 200
      - 404
  when: library_check.status == 200
  no_log: true

- name: Check if configured project already exists
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects/{{ harbor_project_name }}"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code:
      - 200
      - 404
  register: project_check
  no_log: true

- name: Create configured project
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      project_name: "{{ harbor_project_name }}"
      public: false
      storage_limit: -1
    status_code:
      - 201
      - 409
  when: project_check.status == 404
  no_log: true

- name: Show Harbor URL and project
  ansible.builtin.debug:
    msg: "Harbor is available at https://{{ harbor_hostname }}:{{ harbor_https_port }} (also https://{{ ansible_host | default(inventory_hostname) }}:{{ harbor_https_port }}); project '{{ harbor_project_name }}' is ready."
