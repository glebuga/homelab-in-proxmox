---
harbor_install_dir: "/opt/harbor"

# Пропустить загрузку релиза (если уже распакован вручную).
harbor_skip_download: false

harbor_offline_installer: false
harbor_local_installer_src: ""

harbor_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin

# Путь к docker compose плагину после установки.
harbor_compose_bin: "/usr/lib/docker/cli-plugins/docker-compose"
