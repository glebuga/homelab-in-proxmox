---
k3s_version: "v1.36.2+k3s1"

# Role of this host. Auto-detected: the first host in the `kuber` group
# (or any host whose name contains "master") is the master; the rest are
# workers. Override per-host via host_vars if your naming differs.
k3s_role: "{{ 'master' if (inventory_hostname is search('master') or inventory_hostname == groups['kuber'][0]) else 'worker' }}"

# IP/hostname the worker uses to reach the master API server.
k3s_master_ip: "{{ groups['kuber'][0] }}"

# API server port.
k3s_api_port: 6443

# Components to DISABLE on the master (passed to k3s via --disable).
# Traefik (ingress) and servicelb (load-balancer) are not needed for a
# bare cluster that only pulls workloads from a registry (e.g. Harbor).
k3s_disable_components: "traefik servicelb"

k3s_extra_args: ""

# Skip the installer's automatic binary download and use a pre-placed
# /usr/local/bin/k3s (useful in restricted networks).
k3s_skip_download: false

# Populated internally by the role; do not set manually.
k3s_node_token: ""
