---

- name: Determine node role
  ansible.builtin.set_fact:
    k3s_is_master: "{{ k3s_role == 'master' }}"

# ---------------------------------------------------------------------------
# Master: install server
# ---------------------------------------------------------------------------
- name: Install k3s server (master)
  when: k3s_is_master
  block:
    - name: Check if k3s binary already present (master)
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_bin_master

    - name: Download k3s binary (master)
      when:
        - not k3s_skip_download
        - not k3s_bin_master.stat.exists
      ansible.builtin.get_url:
        url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
        dest: /usr/local/bin/k3s
        mode: "0755"
        owner: root
        group: root

    - name: Install k3s server via official installer
      ansible.builtin.shell:
        cmd: "INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_SKIP_DOWNLOAD={{ 'true' if k3s_skip_download else 'false' }} K3S_KUBECONFIG_MODE=600 sh -s - server --disable {{ k3s_disable_components }} {{ k3s_extra_args }}"
        creates: /etc/systemd/system/k3s.service
      register: k3s_install
      no_log: true

    - name: Enable and start k3s service
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started
        daemon_reload: true
      when: k3s_install is not skipped

    - name: Wait for k3s server to be ready
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 180

# ---------------------------------------------------------------------------
# Worker: read token from master, install agent, join
# ---------------------------------------------------------------------------
- name: Install k3s agent (worker)
  when: not k3s_is_master
  block:
    - name: Read node token from master
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      delegate_to: "{{ k3s_master_ip }}"
      register: k3s_token_raw
      no_log: true

    - name: Set node token fact
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"
      no_log: true

    - name: Check if k3s binary already present (worker)
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_bin_worker

    - name: Download k3s binary (worker)
      when:
        - not k3s_skip_download
        - not k3s_bin_worker.stat.exists
      ansible.builtin.get_url:
        url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
        dest: /usr/local/bin/k3s
        mode: "0755"
        owner: root
        group: root

    - name: Install k3s agent and join master
      ansible.builtin.shell:
        cmd: "INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_SKIP_DOWNLOAD={{ 'true' if k3s_skip_download else 'false' }} K3S_URL=https://{{ hostvars[k3s_master_ip].ansible_host | default(k3s_master_ip) }}:{{ k3s_api_port }} K3S_TOKEN={{ k3s_node_token }} sh -s -"
        creates: /etc/systemd/system/k3s-agent.service
      register: k3s_agent_install
      no_log: true

    - name: Enable and start k3s-agent service
      ansible.builtin.systemd:
        name: k3s-agent
        enabled: true
        state: started
        daemon_reload: true
      when: k3s_agent_install is not skipped

# ---------------------------------------------------------------------------
# Verification (master only)
# ---------------------------------------------------------------------------
- name: Verify cluster state (master)
  when: k3s_is_master
  block:
    - name: Show cluster nodes
      ansible.builtin.command:
        cmd: "kubectl get nodes -o wide"
      register: k3s_nodes
      changed_when: false

    - name: Show cluster nodes output
      ansible.builtin.debug:
        var: k3s_nodes.stdout

    - name: Show system pods
      ansible.builtin.command:
        cmd: "kubectl get pods -A -o wide"
      register: k3s_pods
      changed_when: false

    - name: Show system pods output
      ansible.builtin.debug:
        var: k3s_pods.stdout
