---
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true

- name: Generate hosts file
  ansible.builtin.template:
    src: homelab.hosts.j2
    dest: "{{ dns_hosts_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

- name: Configure dnsmasq
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: "{{ dns_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

- name: Apply changes
  ansible.builtin.meta: flush_handlers
