---
# ===========================================================================
# Единый источник глобальных переменных (для всех хостов).
# ===========================================================================

# Часовой пояс и локаль, применяются ролями bootstrap/common.
timezone: "Europe/Moscow"
locale: "en_US.UTF-8"
  
admin_user: "admin"

# Пользователь, используемый только в одноразовом bootstrap-плейбуке.
bootstrap_user: "root"

# Инфраструктурные эндпоинты (узел proxmox, шлюз управляющей сети).
proxmox: "192.168.0.200"
# management_ip: "10.0.0.2"

# Корень проекта ansible-modular. Якорит внешние пути (инсталляторы,
# сертификаты), чтобы они не зависели от текущей директории запуска.
ansible_modular_root: "{{ playbook_dir | dirname if playbook_dir is defined else '.' }}"
