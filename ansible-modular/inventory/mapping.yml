
nginx_ip:
  host: nginx
  groups: [nginx_nodes]
  bootstrap: true

docker_ip:
  host: docker
  groups: [docker_nodes]
  bootstrap: true

dns_ip:
  host: dns
  groups: [net_service]
  bootstrap: true

gitlab_ip:
  host: gitlab
  groups: [gitlab_node]
  bootstrap: true

k3s_vm_ips:
  host_prefix: k3s-
  groups: [kuber]
  bootstrap: false

ubuntu_vm_ips:
  host_prefix: vm-
  groups: [ubuntu_vms]
  bootstrap: false

harbor_ip:
  host: harbor
  groups: [harbor_nodes]
  bootstrap: true
